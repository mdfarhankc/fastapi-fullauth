name: Bug Report
description: Report a bug in fastapi-fullauth
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: fastapi-fullauth version
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options:
        - SQLModel
        - SQLAlchemy
        - InMemory
        - Custom
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / traceback
      description: Paste any relevant error messages or tracebacks.
      render: shell
