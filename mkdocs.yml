site_name: fastapi-fullauth
site_url: https://mdfarhankc.github.io/fastapi-fullauth
site_description: Production-grade, async-native authentication and authorization library for FastAPI.
repo_url: https://github.com/mdfarhankc/fastapi-fullauth
repo_name: mdfarhankc/fastapi-fullauth

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/home.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Adapters:
      - Overview: adapters/index.md
      - SQLModel: adapters/sqlmodel.md
      - SQLAlchemy: adapters/sqlalchemy.md
  - Authentication:
      - Protected Routes: auth/dependencies.md
      - Event Hooks: auth/hooks.md
      - Custom Token Claims: auth/custom-claims.md
      - Password Validation: auth/passwords.md
  - OAuth2 Social Login: oauth.md
  - Security:
      - Rate Limiting: security/rate-limiting.md
      - Middleware: security/middleware.md
  - Database Migrations: migrations.md
  - API Reference: api-reference.md
  - Contributing: contributing.md
